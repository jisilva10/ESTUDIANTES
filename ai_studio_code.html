<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de Evaluación</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin: auto; }
        h2 { color: #333; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        input[type="email"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .question-block { background: #f9f9f9; padding: 15px; border-radius: 6px; margin-bottom: 15px; border-left: 4px solid #0056b3; }
        .options { display: flex; justify-content: space-between; max-width: 300px; margin-top: 10px; }
        .options label { font-weight: normal; cursor: pointer; text-align: center; }
        button { width: 100%; padding: 12px; background: #0056b3; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #004494; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" id="survey-container">
    <h2>Encuesta de Evaluación</h2>
    <form id="surveyForm">
        <div class="form-group">
            <label for="email">Tu Correo Electrónico (USFQ):</label>
            <input type="email" id="email" required placeholder="ejemplo@estud.usfq.edu.ec">
        </div>

        <div id="questions-container"></div>

        <button type="submit">Enviar Respuestas</button>
    </form>
</div>

<div class="container hidden" id="success-message">
    <h2 style="color: green;">¡Gracias por tu participación!</h2>
    <p style="text-align: center;">Tus respuestas han sido enviadas correctamente.</p>
</div>

<script>
    // PEGA AQUÍ LA URL DE TU WEBHOOK DE N8N
    const N8N_WEBHOOK_URL = 'https://TU-N8N-URL.com/webhook/xxxx-xxxx-xxxx';

    // Limpié los duplicados que venían en tu texto original para que sean 18 preguntas únicas
    const allQuestions = [
        "¿Con qué frecuencia el profesor inicia y finaliza cada actividad de la sesión dentro de los tiempos estipulados?",
        "¿Qué tan ágil es el paso de una explicación teórica a una actividad práctica sin perder el ritmo del grupo?",
        "¿Qué tan equilibrada percibes la velocidad de la clase (ni muy lenta que aburra, ni muy rápida que confunda)?",
        "¿Qué tan oportunamente responde el profesor a correos o solicitudes académicas?",
        "¿En qué medida se logró cubrir la totalidad de los temas previstos para la sesión sin dejar contenido pendiente?",
        "¿Qué tan claras y comprensibles son las respuestas brindadas ante dudas académicas?",
        "¿Con qué frecuencia el profesor presenta objetivos claros, una secuencia lógica del contenido y un cierre definido en cada clase?",
        "¿Con qué consistencia las explicaciones del profesor fueron claras, comprensibles y bien organizadas durante el curso?",
        "¿Con qué frecuencia el profesor relaciona los contenidos del curso con otras disciplinas o áreas del conocimiento, propias del enfoque de Artes Liberales de la USFQ?",
        "¿Con qué consistencia el profesor promueve el análisis, la reflexión y el cuestionamiento de ideas durante la clase?",
        "¿El profesor cumple con los espacios de tutoría y acompañamiento ofrecidos?",
        "¿Qué tan satisfecho/a estás con el apoyo recibido cuando lo solicitaste?",
        "¿En qué medida la dinámica de la clase le permitió participar activamente, hacer preguntas o aportar ideas?",
        "¿Qué tan satisfecho se siente con su nivel de comprensión y aprendizaje logrado en este curso?",
        "¿En qué medida las actividades de la clase integran reflexión, análisis y conexión con la realidad del estudiante?",
        "¿Qué tan satisfecho se siente con el aporte del curso a su formación integral como estudiante de Artes Liberales?",
        "¿En qué medida la retroalimentación proporcionada por el profesor, basada en la rúbrica, contribuyó a comprender el desempeño académico y mejorar el aprendizaje?",
        "¿Qué tan satisfecho se siente con la claridad, coherencia y equidad del proceso de evaluación mediante rúbricas en esta materia?"
    ];

    // Seleccionar 4 preguntas aleatorias
    const shuffled = allQuestions.sort(() => 0.5 - Math.random());
    const selectedQuestions = shuffled.slice(0, 4);

    const container = document.getElementById('questions-container');

    // Renderizar las preguntas en el HTML
    selectedQuestions.forEach((q, index) => {
        const div = document.createElement('div');
        div.className = 'question-block';
        div.innerHTML = `
            <label>${index + 1}. ${q}</label>
            <div class="options">
                <label><input type="radio" name="q${index}" value="1" required> 1</label>
                <label><input type="radio" name="q${index}" value="2" required> 2</label>
                <label><input type="radio" name="q${index}" value="3" required> 3</label>
                <label><input type="radio" name="q${index}" value="4" required> 4</label>
                <label><input type="radio" name="q${index}" value="5" required> 5</label>
            </div>
            <small style="color:#666; font-size:12px;">(1 = Pobre / Nada satisfecho, 5 = Excelente / Muy satisfecho)</small>
        `;
        container.appendChild(div);
    });

    // Manejar el envío del formulario
    document.getElementById('surveyForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const respuestas = [];

        selectedQuestions.forEach((q, index) => {
            const answer = document.querySelector(`input[name="q${index}"]:checked`).value;
            respuestas.push({
                pregunta: q,
                respuesta: parseInt(answer)
            });
        });

        const payload = { email, respuestas };

        try {
            const btn = document.querySelector('button');
            btn.innerText = "Enviando...";
            btn.disabled = true;

            await fetch(N8N_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            document.getElementById('survey-container').classList.add('hidden');
            document.getElementById('success-message').classList.remove('hidden');

        } catch (error) {
            alert("Hubo un error al enviar la encuesta. Intenta nuevamente.");
            btn.innerText = "Enviar Respuestas";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
